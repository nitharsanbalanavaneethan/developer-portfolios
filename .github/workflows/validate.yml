name: Validate README

on:
  pull_request:
    paths:
      - 'README.md'
      - 'scripts/**'
      - '.github/workflows/validate.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Run validation script
        run: python scripts/validate.py
